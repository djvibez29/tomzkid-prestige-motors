<!DOCTYPE html>
<html>
<head>
    <title>Auto Marketplace</title>
</head>
<body>

<h1>Cars for Sale</h1>

<a href="/add">Add Vehicle</a>

{% for car in vehicles %}
    <div>
        <h2>{{ car.title }}</h2>
        <p>Price: {{ car.price }}</p>

        {% if car.image_url %}
            <img src="{{ url_for('static', filename='uploads/' + car.image_url) }}" width="200">
        {% endif %}
    </div>
{% endfor %}

</body>
</html>
